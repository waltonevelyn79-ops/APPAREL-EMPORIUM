name: Deploy to Hostinger
on:
  push:
    branches: [main]
  workflow_dispatch: # Manual trigger option

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to Hostinger via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.HOSTINGER_HOST }}
          username: ${{ secrets.HOSTINGER_USERNAME }}
          key: ${{ secrets.HOSTINGER_SSH_KEY }}
          port: ${{ secrets.HOSTINGER_PORT }}
          script: |
            source ~/.bashrc || true
            source ~/.bash_profile || true
            export PATH=$PATH:/usr/local/bin:/opt/alt/alt-nodejs22/root/usr/bin:/opt/alt/alt-nodejs20/root/usr/bin
            if [ -s "$HOME/.nvm/nvm.sh" ]; then source "$HOME/.nvm/nvm.sh"; fi

            cd /home/${{ secrets.HOSTINGER_USERNAME }}/domains/mediumblue-wildcat-188317.hostingersite.com/nodejs
            
            # Prevent Hostinger VPS thread & memory crashing
            export NODE_OPTIONS="--max-old-space-size=512"
            git config --global pack.threads 1
            git config --global pack.windowMemory 50m
            
            if [ ! -d ".git" ]; then
              git init
              git remote add origin https://${{ github.actor }}:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git
            fi
            
            # Fetch safely with fallbacks
            git fetch origin main || git fetch origin main --depth=1
            git reset --hard origin/main
            
            # Ensure .env is created for production with robust fallbacks
            echo "DATABASE_URL=\"mysql://u808072502_aelbd:bnij%3F8nL%2F@srv2112.hstgr.io:3306/u808072502_Aelbd\"" > .env
            
            # Use fallback secrets if GitHub secrets are missing to prevent next-auth crashes
            SECRET_VAL="${{ secrets.NEXTAUTH_SECRET }}"
            if [ -z "$SECRET_VAL" ]; then
              SECRET_VAL="super-secure-generated-random-character-secret-key-for-prod-$(date +%s)"
            fi
            echo "NEXTAUTH_SECRET=\"$SECRET_VAL\"" >> .env
            
            URL_VAL="${{ secrets.NEXTAUTH_URL }}"
            if [ -z "$URL_VAL" ]; then
              URL_VAL="https://mediumblue-wildcat-188317.hostingersite.com"
            fi
            echo "NEXTAUTH_URL=\"$URL_VAL\"" >> .env
            
            # System variables
            echo "PRISMA_CLIENT_ENGINE_TYPE=\"binary\"" >> .env
            echo "NEXT_PUBLIC_APP_URL=\"https://mediumblue-wildcat-188317.hostingersite.com\"" >> .env
            
            # Install packages without choking the memory
            npm install --production --no-audit --no-fund
            npx prisma generate
            npx prisma migrate deploy || npx prisma db push --accept-data-loss
            npm run seed || true
            npm run build
            # Gracefully restart application utilizing dynamic npx executable to avoid memory crashes
            npx -y pm2 restart garments-website --update-env || npx -y pm2 start ecosystem.config.js
            echo "✅ Deployment complete!"
