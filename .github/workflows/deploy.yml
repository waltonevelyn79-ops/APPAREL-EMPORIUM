name: Deploy to Hostinger
on:
  push:
    branches: [main]
  workflow_dispatch: # Manual trigger option

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to Hostinger via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.HOSTINGER_HOST }}
          username: ${{ secrets.HOSTINGER_USERNAME }}
          key: ${{ secrets.HOSTINGER_SSH_KEY }}
          script: |
            cd /home/${{ secrets.HOSTINGER_USERNAME }}/your-app-directory
            git pull origin main
            
            # Ensure .env is created for production
            echo "DATABASE_URL=\"mysql://u808072502_aelbd:bnij%3F8nL%2F@localhost:3306/u808072502_Aelbd\"" > .env
            echo "NEXTAUTH_SECRET=\"${{ secrets.NEXTAUTH_SECRET }}\"" >> .env
            echo "NEXTAUTH_URL=\"${{ secrets.NEXTAUTH_URL }}\"" >> .env
            
            npm ci --production
            npx prisma generate
            npx prisma db push
            npm run build
            pm2 restart garments-website || pm2 start ecosystem.config.js
            echo "✅ Deployment complete!"
